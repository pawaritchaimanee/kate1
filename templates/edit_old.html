<!DOCTYPE html>
<html>
<head>
    <title>Edit Cosmetic Product</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fdfdfd;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #d4a373; /* สีทองชมพู */
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #fafafa;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #d4a373;
            background-color: #fff;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #d4a373;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        button:hover {
            background-color: #bc8a5f;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: #d4a373;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="box">
        <h2>✏️ แก้ไขข้อมูลสินค้า</h2>

        <form method="POST">
            <div class="form-group">
                <label>✨ ชื่อผลิตภัณฑ์</label>
                <input name="name" value="{{ product.name }}" required placeholder="ระบุชื่อเครื่องสำอาง">
            </div>

            <div class="form-group">
                <label>💰 ราคา (บาท)</label>
                <input name="price" type="number" step="0.01" min="0" value="{{ product.price }}" required>
            </div>

            <div class="form-group">
                <label>🖼️ URL รูปภาพสินค้า</label>
                <input name="image_url" value="{{ product.image_url }}" placeholder="https://example.com/product.jpg">
            </div>

            <div class="form-group">
                <label>📦 จำนวนในคลัง</label>
                <input name="stock" type="number" min="0" value="{{ product.stock or 0 }}" required>
            </div>

            <div class="form-group">
                <label>🏷️ หมวดหมู่</label>
                <select name="category_id">
                    <option value="">เลือกหมวดหมู่</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}" {% if category.id == product.category_id %}selected{% endif %}>
                        {{ category.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit">💾 บันทึกการแก้ไข</button>
        </form>

        <a href="/" class="back-link">⬅️ กลับหน้าหลัก</a>
    </div>
</div>

</body>
</html>
