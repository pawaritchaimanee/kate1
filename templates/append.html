<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .box { 
            background: white; 
            padding: 50px; 
            border-radius: 20px; 
            width: 100%;
            max-width: 500px; 
            border: none; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        .box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
        }
        h2 { 
            color: #667eea; 
            text-align: center; 
            font-weight: 300; 
            margin-bottom: 40px; 
            font-size: 28px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
            font-size: 14px;
        }
        input, select { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #f0f0f0; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px;
            background: #fafafa;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #ff9a9e;
            background: white;
            box-shadow: 0 0 0 3px rgba(255,154,158,0.1);
        }
        button { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); 
            color: white; 
            border: none; 
            border-radius: 10px;
            cursor: pointer; 
            margin-top: 30px; 
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,154,158,0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,154,158,0.4);
        }
        .back-link {
            display: block; 
            text-align: center; 
            margin-top: 30px; 
            color: #aaa; 
            text-decoration: none; 
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #ff9a9e;
        }
        @media (max-width: 768px) {
            .box { padding: 30px; margin: 20px; }
            h2 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>✨ Add Cosmetic Item</h2>
        <form method="POST">
            <div class="form-group">
                <label>Product Name</label>
                <input name="name" placeholder="e.g. Matte Lipstick" required>
            </div>
            <div class="form-group">
                <label>Price (THB)</label>
                <input name="price" type="number" step="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input name="image_url" placeholder="https://example.com/image.jpg">
            </div>
            <div class="form-group">
                <label>Stock Quantity</label>
                <input name="stock" type="number" placeholder="0" value="0">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="category_id">
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit">SAVE PRODUCT</button>
        </form>
        <a href="/" class="back-link">Cancel</a>
    </div>
</body>
</html>
