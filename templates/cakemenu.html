<!DOCTYPE html>
<html>
<head>
    <title>Beauty Bloom | Cosmetic Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            color: #333; 
            margin: 0; 
            min-height: 100vh;
        }
        header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            padding: 60px 20px; 
            text-align: center; 
            color: white; 
            font-size: 48px; 
            letter-spacing: 3px;
            font-weight: 300;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
        }
        .container { 
            width: 90%; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 60px 20px; 
        }
        .btn { 
            padding: 15px 30px; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 600; 
            display: inline-block; 
            margin-bottom: 40px; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255,154,158,0.3);
            font-size: 16px;
            letter-spacing: 1px;
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,154,158,0.4);
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 40px; 
        }
        .card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden;
            transition: all 0.4s ease; 
            position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card:hover { 
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .card img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
            transition: transform 0.4s ease;
        }
        .card:hover img {
            transform: scale(1.05);
        }
        .card-info { 
            padding: 25px; 
            text-align: center; 
        }
        .category { 
            color: #ff9a9e; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 500;
            margin-bottom: 10px;
        }
        .card h3 {
            margin: 15px 0; 
            font-weight: 500; 
            font-size: 20px;
            color: #333;
        }
        .price { 
            color: #667eea; 
            font-weight: 700; 
            margin: 15px 0; 
            font-size: 22px; 
        }
        .stock {
            font-size: 14px; 
            color: #888;
            margin: 10px 0;
        }
        .actions { 
            display: flex; 
            border-top: 1px solid #f0f0f0; 
            background: #fafafa;
        }
        .actions a { 
            flex: 1; 
            text-align: center; 
            padding: 15px; 
            font-size: 14px; 
            text-decoration: none; 
            color: #666; 
            border-right: 1px solid #f0f0f0;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .actions a:last-child {
            border-right: none;
        }
        .actions a:hover { 
            background: #ff9a9e; 
            color: white;
        }
        .actions a:nth-child(2):hover {
            background: #ff6b6b;
        }
        @media (max-width: 768px) {
            header { font-size: 36px; padding: 40px 20px; }
            .container { padding: 40px 10px; }
            .grid { grid-template-columns: 1fr; gap: 20px; }
        }
    </style>
</head>
<body>
    <header>BEAUTY BLOOM ✨</header>
    <div class="container">
        <a href="/append" class="btn">+ ADD NEW PRODUCT</a>
        <div class="grid">
            {% for product in products %}
            <div class="card">
                <img src="{{ product.image_url }}" alt="Product Image">
                <div class="card-info">
                    <div class="category">{{ product.category_name }}</div>
                    <h3>{{ product.name }}</h3>
                    <div class="price">{{ product.price }} THB</div>
                    <div class="stock">In Stock: {{ product.stock }}</div>
                </div>
                <div class="actions">
                    <a href="/edit/{{ product.id }}">EDIT</a>
                    <a href="/delete/{{ product.id }}">DELETE</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
